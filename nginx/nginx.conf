# HTTP — ACME challenge + redirección a HTTPS
server {
    listen 80;
    server_name cyfl.yatat www.cyfl.yatat;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name cyfl.yatat www.cyfl.yatat;

    ssl_certificate /etc/letsencrypt/live/cyfl.yatat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyfl.yatat/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cyfl.yatat/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/css text/plain application/json application/javascript image/svg+xml image/x-icon;
    gzip_min_length 1000;

    location /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_cache_bypass $http_upgrade;
    }
}
