<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register - CYFL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">.

</head>

<body class="bg-light d-flex align-items-center vh-100">

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source th:src="@{/media/fondo.mp4}" type="video/mp4">
            Your browser does not support videos.
        </video>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold">Create your account</h2>

                        <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>

                        <div th:if="${exito}" class="alert alert-success text-center" th:text="${exito}"></div>

                        <form th:action="@{/registro}" method="POST">

                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="nombre" class="form-control" required placeholder="Tu nombre">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" required
                                    placeholder="tu@correo.com">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required
                                    placeholder="Mínimo 6 caracteres">
                            </div>

                            <button type="submit" class="btn btn-success w-100 btn-lg">Create Account</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted">Do you already have an account? <a href="/login"
                                    class="text-success text-decoration-none fw-bold">Log in here</a></p>
                            <a href="/" class="text-muted text-decoration-none small">Back to top</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
