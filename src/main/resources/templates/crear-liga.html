<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Crear Liga - CYFL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/home">⚽ CYFL</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item px-2"><a class="nav-link text-white fw-bold" href="/home">Inicio</a></li>
                    <li class="nav-item px-2"><a class="nav-link text-white fw-bold" href="/perfil">Perfil</a></li>
                    <li class="nav-item ps-4">
                        <form th:action="@{/logout}" method="POST" class="m-0">
                            <button type="submit" class="btn btn-sm btn-outline-light px-3">Cerrar Sesión</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-body p-5">
                        <h2 class="fw-bold mb-4">Configura tu Nueva Liga</h2>
                        <p class="text-muted mb-4">Rellena los datos básicos para empezar a organizar los equipos y el
                            calendario.</p>

                        <form th:action="@{/nueva-liga}" method="POST" enctype="multipart/form-data">

                            <div class="mb-3">
                                <label class="form-label fw-bold small">Nombre de la Competición</label>
                                <input type="text" name="nombre" class="form-control"
                                    placeholder="Ej: Liga Local Verano" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold small">Descripción (Opcional)</label>
                                <textarea name="descripcion" class="form-control" rows="3"
                                    placeholder="Detalles sobre las reglas..."></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold small">Foto de Perfil de la Liga</label>
                                <input type="file" name="archivo" class="form-control" accept="image/*">
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success fw-bold py-2">Crear Liga</button>
                                <a href="/home" class="btn btn-link text-muted text-decoration-none small">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
