<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - CYFL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold">Bienvenido de nuevo</h2>
                        
                        <div th:if="${param.error}" class="alert alert-danger text-center">
                            Correo o contraseña incorrectos.
                        </div>

                        <div th:if="${param.logout}" class="alert alert-success text-center">
                            Has cerrado sesión correctamente.
                        </div>

                        <form action="/login" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" name="username" class="form-control" required placeholder="tu@correo.com">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Contraseña</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 btn-lg">Entrar al campo</button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="text-muted">¿No tienes equipo? <a href="/registro" class="text-success text-decoration-none fw-bold">Regístrate aquí</a></p>
                            <a href="/" class="text-muted text-decoration-none small">Volver al inicio</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
