<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - CYFL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">.

</head>

<body class="bg-light d-flex align-items-center vh-100">

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source th:src="@{/media/fondo.mp4}" type="video/mp4">
            Your browser does not support videos.
        </video>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold">Welcome back</h2>

                        <div th:if="${param.error != null and param.error[0] == 'disabled'}" class="alert alert-warning text-center fw-bold">
                            Your account has been deactivated. Contact an administrator.
                        </div>

                        <div th:if="${param.error != null and param.error[0] != 'disabled'}" class="alert alert-danger text-center">
                            Incorrect email or password.
                        </div>

                        <div th:if="${param.logout}" class="alert alert-success text-center">
                            You have successfully logged out.
                        </div>

                        <form action="/login" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="username" class="form-control" required
                                    placeholder="tu@correo.com">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 btn-lg">Login</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted">Don't you have a computer? <a href="/registro"
                                    class="text-success text-decoration-none fw-bold">Register here</a></p>
                            <a href="/" class="text-muted text-decoration-none small">Back to top</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
