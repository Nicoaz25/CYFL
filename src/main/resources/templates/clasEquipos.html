<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Teams Classification | CYFL</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .header-banner {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 2rem 0;
            border-bottom: 4px solid #155e37;
            margin-bottom: 2rem;
        }

        .team-avatar-small {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            overflow: hidden;
            background-color: #e9ecef;
            border: 1px solid #dee2e6;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
    </style>
</head>

<body class="bg-light">

    <div class="header-banner shadow">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-0">
                    <i class="fa-solid fa-shield-halved text-success me-2"></i>
                    Teams Ranking
                </h2>
                <p class="text-white-50 mb-0 mt-1">Official league standings</p>
            </div>

            <a th:href="@{/liga/{id}(id=${liga.id})}" class="btn btn-outline-light fw-bold">
                <i class="fa-solid fa-arrow-left me-2"></i> Back to the League
            </a>
        </div>
    </div>

    <div class="container mb-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h4 class="text-secondary m-0">
                <i class="fa-solid fa-filter me-2"></i> Sorting filter
            </h4>

            <form th:action="@{/liga/{leagueId}/clasEquipos(leagueId=${liga.id})}" method="get">
                <select name="ordenarPor" class="form-select shadow-sm fw-bold" onchange="this.form.submit()">

                    <option value="puntos" th:selected="${ordenarPor == 'puntos'}">⭐ Points</option>
                    <option value="ganados" th:selected="${ordenarPor == 'ganados'}">🏆 Won</option>
                    <option value="empatados" th:selected="${ordenarPor == 'empatados'}">🤝 Tied</option>
                    <option value="perdidos" th:selected="${ordenarPor == 'perdidos'}">❌ Lost</option>

                </select>
            </form>

        </div>

        <table class="table table-striped table-hover shadow bg-white">

            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Teams</th>
                    <th>MP</th>
                    <th>MW</th>
                    <th>MT</th>
                    <th>ML</th>
                    <th>Pts</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="equipo, stat : ${equipos}">

                    <td th:text="${stat.count}"></td>

                    <td class="align-middle">
                        <div class="d-flex align-items-center gap-2">

                            <div class="team-avatar-small">
                                <img th:if="${equipo.logo != null and equipo.logo != ''}"
                                    th:src="@{'/uploads/' + ${equipo.logo}}" alt="Escudo"
                                    style="width: 100%; height: 100%; object-fit: cover;"
                                    onerror="this.src='/img/default-team.png'">

                                <i th:unless="${equipo.logo != null and equipo.logo != ''}"
                                    class="fa-solid fa-shield-halved text-secondary"></i>
                            </div>

                            <span class="fw-bold" th:text="${equipo.name}"></span>

                        </div>
                    </td>
                    <td th:text="${equipo.partidosJugados}"></td>
                    <td th:text="${equipo.partidosGanados}"></td>
                    <td th:text="${equipo.partidosEmpatados}"></td>
                    <td th:text="${equipo.partidosPerdidos}"></td>
                    <td class="fw-bold" th:text="${equipo.puntos}"></td>

                </tr>
            </tbody>

        </table>

    </div>

</body>

</html>
