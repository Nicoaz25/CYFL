<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYFL - Home</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">. 
</head>

<body class="text-white d-flex align-items-center vh-100 m-0 p-0">

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source th:src="@{/media/fondo.mp4}" type="video/mp4">
            Your browser does not support videos.
        </video>
    </div>
    <div class="video-overlay"></div>

    <div class="container text-center text-md-start" style="margin-bottom: 80px;">
        <div class="row">
            <div class="col-lg-7">
                <span class="badge bg-success mb-2 px-3 py-2 fs-6">Intermodular Project</span>
                <h1 class="display-2 fw-bold mb-2 text-white">⚽ CYFL</h1>
                <h3 class="fw-semibold text-success mb-3">Football League Manager</h3>
                <p class="text-light opacity-75 mb-4 fs-5" style="max-width: 600px;">
                    Web application designed to create your own leagues, manage teams, and add players, as well as view individual and team statistics.
                </p>

                <div class="d-grid gap-3 d-sm-flex justify-content-sm-center justify-content-md-start">
                    <a href="/login" class="btn btn-success btn-lg px-5 fw-bold shadow">Login</a>
                    <a href="/registro" class="btn btn-outline-light btn-lg px-4">Create Account</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-info text-white-50 py-3">
        <div class="container">
            <div class="row align-items-center justify-content-between text-center text-md-start">
                <div class="col-md-6 mb-2 mb-md-0">
                    <p class="m-0 small">
                        <strong class="text-white">Developer:</strong> Nico Adrià | Student of Desarrollo de
                        Aplicaciones Multiplataforma
                    </p>
                </div>
                
            </div>
        </div>
    </footer>

</body>

</html>
