<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Panel de Control - CYFL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source th:src="@{/media/fondo.mp4}" type="video/mp4">
            Tu navegador no soporta videos.
        </video>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/home">⚽ CYFL</a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item">
                        <span class="text-white me-3" th:text="'Hola, ' + ${emailUsuario}">Hola, usuario</span>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/perfilUser}">
                            Perfil
                        </a>
                    </li>

                    <li class="nav-item ms-3">
                        <form th:action="@{/logout}" method="POST" class="m-0">
                            <button type="submit" class="btn btn-sm btn-outline-light">Cerrar Sesión</button>
                        </form>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- HEADER -->
        <div class="bg-white p-4 rounded-4 shadow-sm mb-5">
            <div class="row align-items-center">

                <div class="col-md-8">
                    <h1 class="fw-bold m-0 text-dark">Mis Ligas</h1>
                    <p class="text-muted m-0 mt-1">Gestiona tus competiciones desde aquí.</p>
                </div>

                <div class="col-md-4 text-md-end mt-3 mt-md-0">
                    <a href="/nueva-liga" class="btn btn-success btn-lg px-4 shadow-sm fw-bold">
                        + Crear Nueva Liga
                    </a>
                </div>

            </div>
        </div>

        <!-- LIGAS -->
        <div class="row g-4">

            <div class="col-md-4" th:each="liga : ${ligas}">

                <div class="card card-liga h-100 shadow-sm border-0 overflow-hidden" style="border-radius: 15px;">

                    <!-- IMAGEN -->
                    <div style="height: 180px; overflow: hidden; background-color: #e9ecef;">
                        <img th:src="@{'/uploads/' + ${liga.logo}}" class="card-img-top" alt="Banner de la liga"
                            style="width: 100%; height: 100%; object-fit: cover;">
                    </div>

                    <!-- CONTENIDO -->
                    <div class="card-body p-4">

                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="fw-bold m-0" th:text="${liga.name}" style="color: #1a1a1a;">
                                Nombre de la Liga
                            </h5>

                            <span class="badge bg-success-subtle text-success border border-success-subtle">
                                Activa
                            </span>
                        </div>

                        <p class="text-muted small mb-4" th:text="${liga.description}"
                            style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                            Descripción de la liga
                        </p>

                        <!-- BOTONES -->
                        <div class="d-grid gap-2">

                            <!-- ENTRAR -->
                            <a th:href="@{/liga/{id}(id=${liga.id})}" class="btn btn-success fw-bold py-2 shadow-sm"
                                style="border-radius: 8px;">
                                Entrar a la Competición
                            </a>

                            <!-- ELIMINAR -->
                            <form th:action="@{/liga/{id}/eliminar(id=${liga.id})}" method="post"
                                onsubmit="return confirm('¿Seguro que quieres eliminar esta liga? Se borrarán equipos y jugadores.');">

                                <button type="submit" class="btn btn-danger fw-bold py-2 shadow-sm w-100"
                                    style="border-radius: 8px;">
                                    Eliminar Liga
                                </button>

                            </form>

                        </div>

                    </div>
                </div>

            </div>

            <!-- SI NO HAY LIGAS -->
            <div class="col-12" th:if="${#lists.isEmpty(ligas)}">

                <div class="card card-crear d-flex align-items-center justify-content-center p-5 text-center shadow-sm">

                    <div class="mb-3 fs-1">📂</div>

                    <h4 class="text-success fw-bold">No tienes ligas creadas</h4>

                    <p class="text-muted">
                        Haz clic en el botón de arriba a la derecha para configurar tu primer torneo.
                    </p>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
