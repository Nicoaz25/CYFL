<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Panel de Control - CYFL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-crear {
            border: 2px dashed #198754;
            background-color: #f0fdf4;
            height: 150px;
        }

        .card-liga {
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .card-liga:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/home">⚽ CYFL</a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item">
                        <span class="text-white me-3" th:text="'Hola, ' + ${emailUsuario}">Hola, usuario</span>

                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/home">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/perfil">Perfil</a>
                    </li>

                    <li class="nav-item ms-3">
                        <form th:action="@{/logout}" method="POST" class="m-0">
                            <button type="submit" class="btn btn-sm btn-outline-light">Cerrar Sesión</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row align-items-center mb-5">
            <div class="col-md-8">
                <h1 class="fw-bold">Mis Ligas</h1>
                <p class="text-muted">Gestiona tus competiciones desde aquí.</p>
            </div>
            <div class="col-md-4 text-md-end">
                <a href="#" class="btn btn-success btn-lg px-4 shadow-sm">
                    + Crear Nueva Liga
                </a>
            </div>
        </div>

        <div class="row g-4">

            <div class="col-md-12">
                <div class="card card-crear d-flex align-items-center justify-content-center">
                    <p class="text-success fw-bold m-0">Aún no has creado ninguna liga. ¡Haz clic en el botón de arriba
                        para empezar!</p>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
