<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${equipo.name} + ' - Detalle del Club | CYFL'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/verEquipo.css}">
</head>

<body>

    <div class="main-wrapper">

        <header class="topbar">
            <div class="sidebar-header">
                <h4><img src="/media/LogoCYFL.png" alt="CYFL Team" height="40" class="me-1"> CYFL Team</h4>
            </div>

            <div class="topbar-actions">
                <a th:href="@{/liga/{leagueId}/clasEquipos(leagueId=${ligaId})}"
                    class="btn btn-outline-success fw-bold">
                    <i class="fa-solid fa-table-list"></i> Team Classification
                </a>

                <a th:href="@{/liga/{leagueId}/clasJugadores(leagueId=${ligaId})}"
                    class="btn btn-outline-primary fw-bold">
                    <i class="fa-solid fa-medal"></i> Player Ranking
                </a>
            </div>

            <div class="topbar-right d-flex align-items-center gap-3">
                <span class="text-muted fw-bold">Administrator Mode</span>

                <form th:action="@{/logout}" method="POST" class="m-0">
                    <button type="submit" class="btn btn-dark btn-sm">
                        <i class="fa-solid fa-right-from-bracket"></i> Exit
                    </button>
                </form>
            </div>
        </header>


        <header class="team-hero-banner">
            <div class="hero-team-info">

                <div class="hero-club-logo"
                    style="background-color: white; border-radius: 50%; overflow: hidden; display: flex; justify-content: center; align-items: center;">
                    <img th:if="${equipo.logo != null and equipo.logo != ''}"
                        th:src="@{'/uploads/' + ${#strings.trim(equipo.logo)}}" alt="Escudo"
                        style="width: 100%; height: 100%; object-fit: contain;">

                </div>

                <div class="hero-text">
                    <h1 th:text="${equipo.name}">Team Name</h1>
                    <p class="hero-stadium">
                        <i class="fa-solid fa-location-dot"></i>
                        <span th:text="'Estadio: ' + ${equipo.stadium}">Club Stadium</span>
                    </p>
                </div>
            </div>

            <div class="hero-actions">
                <a th:href="@{/liga/{id}(id=${ligaId})}" class="btn btn-outline-light px-4 fw-bold shadow-sm">
                    <i class="fa-solid fa-arrow-left me-2"></i> Back to the League
                </a>
            </div>
        </header>



        <div class="card squad-card">
            <div class="card-body p-0">

                <div class="squad-title text-secondary">
                    <h4 class="fw-bold m-0"><i class="fa-solid fa-users me-2 text-success"></i>Official Template</h4>
                    <span class="squad-count" th:text="${#lists.size(jugadores)} + ' Registered Players'">0</span>
                </div>

                <div class="table-responsive">
                    <table class="cyfl-table align-middle">
                        <thead>
                            <tr>
                                <th class="text-center">Dorsal</th>
                                <th>Name</th>
                                <th>Position</th>
                                <th>Age</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(jugadores)}">
                                <td colspan="4" class="text-center text-muted py-5 fs-5">
                                    <i class="fa-solid fa-user-slash fs-1 d-block mb-3 opacity-50"></i>
                                    There are no players registered on this team yet.
                                </td>
                            </tr>

                            <tr th:each="jugador : ${jugadores}">
                                <td class="col-dorsal" th:text="${jugador.dorsal}">10</td>

                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="player-avatar"
                                            style="overflow: hidden; padding: 0; background-color: white; border: 2px solid #e2e8f0; display: flex; justify-content: center; align-items: center;">

                                            <img th:if="${jugador.logo != null and jugador.logo != ''}"
                                                th:src="@{'/uploads/' + ${jugador.logo}}" alt="Foto Jugador"
                                                style="width: 100%; height: 100%; object-fit: cover;"
                                                onerror="this.src='https://via.placeholder.com/150';">

                                            <i th:unless="${jugador.logo != null and jugador.logo != ''}"
                                                class="fa-solid fa-user text-secondary"></i>
                                        </div>
                                        <div class="col-nombre ms-2">
                                            <a th:href="@{/liga/{leagueId}/jugador/{playerId}(leagueId=${ligaId}, playerId=${jugador.id})}"
                                                class="text-dark fw-bold text-decoration-none">
                                                <span th:text="${jugador.name}">Player</span>
                                            </a>
                                        </div>
                                    </div>
                                </td>

                                <td>
                                    <span class="badge-posicion badge-pill"
                                        th:text="${jugador.position}">Forward</span>
                                </td>

                                <td>
                                    <span class="badge-edad" th:text="${jugador.age} + ' years'">28 years</span>
                                </td>

                                <td class="text-end">
                                    <form th:action="@{/liga/{leagueId}/equipo/{teamId}/jugador/{playerId}/eliminar(
                                        leagueId=${ligaId},
                                        teamId=${equipo.id},
                                        playerId=${jugador.id})}" method="post"
                                        onsubmit="return confirm('¿Seguro que quieres eliminar este jugador?');">

                                        <button class="btn btn-sm btn-danger">
                                            <i class="fa-solid fa-trash"></i> Delete
                                        </button>

                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
