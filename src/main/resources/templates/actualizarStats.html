<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Update Stats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="mb-4">Update statistics of <span th:text="${jugador.name}"></span></h2>

        <form th:action="@{/liga/{ligaId}/jugador/{playerId}/actualizarStats(ligaId=${ligaId}, playerId=${jugador.id})}"
            method="post">

            <div class="mb-2">
                <label>Goals</label>
                <input type="number" name="goles" class="form-control" value="0">
            </div>

            <div class="mb-2">
                <label>Assists</label>
                <input type="number" name="asistencias" class="form-control" value="0">
            </div>

            <div class="mb-2">
                <label>Matches Won</label>
                <input type="number" name="partidosGanados" class="form-control" value="0">
            </div>

            <div class="mb-2">
                <label>Matches Tied</label>
                <input type="number" name="partidosEmpatados" class="form-control" value="0">
            </div>

            <div class="mb-2">
                <label>Matches Lost</label>
                <input type="number" name="partidosPerdidos" class="form-control" value="0">
            </div>

            <div class="mb-2">
                <label>Yellow</label>
                <input type="number" name="amarillas" class="form-control" value="0">
            </div>

            <div class="mb-2">
                <label>Reds</label>
                <input type="number" name="rojas" class="form-control" value="0">
            </div>

            <button class="btn btn-success mt-3">Update</button>

        </form>

    </div>

</body>

</html>
