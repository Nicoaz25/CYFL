<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Jugador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>Editar Jugador</h2>

    <form th:action="@{/liga/{leagueId}/jugador/{playerId}/editar(
            leagueId=${ligaId},
            playerId=${jugador.id})}"
          method="post"
          enctype="multipart/form-data">

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" name="name" class="form-control" th:value="${jugador.name}">
        </div>

        <div class="mb-3">
            <label>Edad</label>
            <input type="number" name="age" class="form-control" th:value="${jugador.age}">
        </div>

        <div class="mb-3">
            <label>Dorsal</label>
            <input type="number" name="dorsal" class="form-control" th:value="${jugador.dorsal}">
        </div>

        <div class="mb-3">
            <label>Posición</label>
            <select name="position" class="form-control">
                <option th:selected="${jugador.position == 'Portero'}">Portero</option>
                <option th:selected="${jugador.position == 'Defensa'}">Defensa</option>
                <option th:selected="${jugador.position == 'Centrocampista'}">Centrocampista</option>
                <option th:selected="${jugador.position == 'Delantero'}">Delantero</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Cambiar Foto</label>
            <input type="file" name="file" class="form-control">
        </div>

        <button class="btn btn-success">Guardar cambios</button>

        <a th:href="@{/liga/{id}/jugador/{playerId}(id=${ligaId}, playerId=${jugador.id})}"
           class="btn btn-secondary">Cancelar</a>

    </form>

</div>

</body>
</html>
