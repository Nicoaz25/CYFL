<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>Edit Player</h2>

    <form th:action="@{/liga/{leagueId}/jugador/{playerId}/editar(
            leagueId=${ligaId},
            playerId=${jugador.id})}"
          method="post"
          enctype="multipart/form-data">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" th:value="${jugador.name}">
        </div>

        <div class="mb-3">
            <label>Age</label>
            <input type="number" name="age" class="form-control" th:value="${jugador.age}">
        </div>

        <div class="mb-3">
            <label>Dorsal</label>
            <input type="number" name="dorsal" class="form-control" th:value="${jugador.dorsal}">
        </div>

        <div class="mb-3">
            <label>Position</label>
            <select name="position" class="form-control">
                <option th:selected="${jugador.position == 'Portero'}">Goalkeeper</option>
                <option th:selected="${jugador.position == 'Defensa'}">Defense</option>
                <option th:selected="${jugador.position == 'Centrocampista'}">Midfield</option>
                <option th:selected="${jugador.position == 'Delantero'}">Forward</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Change Photo</label>
            <input type="file" name="file" class="form-control">
        </div>

        <button class="btn btn-success">Save changes</button>

        <a th:href="@{/liga/{id}/jugador/{playerId}(id=${ligaId}, playerId=${jugador.id})}"
           class="btn btn-secondary">Cancel</a>

    </form>

</div>

</body>
</html>
