<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Perfil Jugador | CYFL</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/perfil.css}">
</head>

<body>

    <header class="topbar">
        <div class="topbar-left">
            <div class="sidebar-header">
                <h4>⚽ CYFL Jugador</h4>
            </div>
            <div class="topbar-actions">
                <a th:href="@{/liga/{id}(id=${ligaId})}" class="btn btn-outline-success fw-bold">
                    <i class="fa-solid fa-table-list"></i> Clasificación Equipos
                </a>
                <a th:href="@{/liga/{leagueId}/clasJugadores(leagueId=${ligaId})}"
                    class="btn btn-outline-primary fw-bold">
                    <i class="fa-solid fa-medal"></i> Clasificación Jugadores
                </a>
            </div>
        </div>

        <div class="topbar-right d-flex align-items-center gap-3">
            <span class="text-muted fw-bold">Modo Administrador</span>
            <form th:action="@{/logout}" method="POST" class="m-0">
                <button type="submit" class="btn btn-dark btn-sm">
                    <i class="fa-solid fa-right-from-bracket"></i> Salir
                </button>
            </form>
        </div>
    </header>

    <div class="container-profile">

        <div class="header-card d-flex justify-content-between align-items-center">

            <div class="player-info d-flex align-items-center">
                <div class="avatar">
                    <img th:if="${jugador.logo != null and jugador.logo != ''}"
                        th:src="@{'/uploads/' + ${jugador.logo}}">
                    <img th:unless="${jugador.logo != null and jugador.logo != ''}"
                        src="https://via.placeholder.com/150">
                </div>

                <div class="ms-3">
                    <h1 class="player-name" th:text="${jugador.name}">Jugador</h1>
                    <div class="sub-info">
                        <div><i class="fa-solid fa-shield"></i> <span th:text="${equipo.name}"></span></div>
                        <div><i class="fa-solid fa-shirt"></i> Dorsal: <span th:text="${jugador.dorsal}"></span></div>
                        <div><i class="fa-solid fa-person-running"></i> <span th:text="${jugador.position}"></span>
                        </div>
                        <div><i class="fa-solid fa-cake-candles"></i> Edad: <span th:text="${jugador.age}"></span></div>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <a th:href="@{/liga/{ligaId}/jugador/{playerId}/actualizarStats(ligaId=${ligaId}, playerId=${jugador.id})}"
                    class="btn btn-success fw-bold">
                    <i class="fa-solid fa-chart-line"></i> Actualizar Stats
                </a>
                <a th:href="@{/liga/{leagueId}/jugador/{playerId}/editar(
                    leagueId=${ligaId},
                    playerId=${jugador.id})}" class="btn btn-primary fw-bold">
                    <i class="fa-solid fa-pen"></i> Editar Perfil
                </a>
            </div>

            <div class="text-end">
                <a th:href="@{/liga/{id}/equipo/{teamId}(id=${ligaId}, teamId=${equipo.id})}" class="back-btn">
                    <i class="fa fa-arrow-left"></i> Volver
                </a>
            </div>

        </div>

        <div class="section-title">
            <i class="fa-solid fa-chart-line"></i> Estadísticas del Jugador
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" th:text="${jugador.goles}">0</div>
                <div class="stat-label">Goles</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${jugador.asistencias}">0</div>
                <div class="stat-label">Asistencias</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${jugador.partidosJugados}">0</div>
                <div class="stat-label">Partidos Jugados</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${jugador.partidosGanados}">0</div>
                <div class="stat-label">P.Ganados</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${jugador.partidosEmpatados}">0</div>
                <div class="stat-label">P.Empatados</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${jugador.partidosPerdidos}">0</div>
                <div class="stat-label">P.Perdidos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${jugador.tarjetasAmarillas}">0</div>
                <div class="stat-label">Amarillas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${jugador.tarjetasRojas}">0</div>
                <div class="stat-label">Rojas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${jugador.puntos}">0</div>
                <div class="stat-label">Puntos</div>
            </div>
        </div>

    </div>

</body>

</html>
