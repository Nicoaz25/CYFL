spring.application.name=cyfl

# MySQL - configurable via env vars (DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:CYFL}?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory - configurable via APP_UPLOAD_DIR env var
app.upload.dir=${APP_UPLOAD_DIR:src/main/resources/static/uploads/}